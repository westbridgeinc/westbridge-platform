# Westbridge: ERPNext (headless) + Postgres (app DB). Next.js runs separately (npm run dev).
services:
  # PostgreSQL for Westbridge app (signup, accounts, 2Checkout)
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: westbridge
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mariadb:
    image: mariadb:10.11
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: frappe
    volumes:
      - mariadb-data:/var/lib/mysql
    ports:
      - "127.0.0.1:3307:3306"

  redis:
    image: redis:6.2-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    ports:
      - "127.0.0.1:6380:6379"

  erpnext:
    image: frappe/erpnext:v16
    restart: always
    volumes:
      - erpnext-sites:/home/frappe/frappe-bench/sites
    environment:
      - FRAPPE_REDIS_CACHE=redis://redis:6379/0
      - FRAPPE_REDIS_QUEUE=redis://redis:6379/1
      - FRAPPE_REDIS_SOCKETIO=redis://redis:6379/2
    depends_on:
      - mariadb
      - redis
    ports:
      - "127.0.0.1:8080:8080"

  erpnext-worker:
    image: frappe/erpnext:v16
    restart: always
    command: bench worker --queue long,default,short
    volumes:
      - erpnext-sites:/home/frappe/frappe-bench/sites
    environment:
      - FRAPPE_REDIS_CACHE=redis://redis:6379/0
      - FRAPPE_REDIS_QUEUE=redis://redis:6379/1
      - FRAPPE_REDIS_SOCKETIO=redis://redis:6379/2
    depends_on:
      - mariadb
      - redis
      - erpnext

volumes:
  postgres-data:
  mariadb-data:
  erpnext-sites:
