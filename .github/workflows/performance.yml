name: Performance

on:
  schedule:
    - cron: '0 3 * * *'  # Nightly 3am
  workflow_dispatch:
  pull_request:
    paths:
      - 'app/**'
      - 'lib/**'
      - 'load-tests/**'

jobs:
  load-test:
    name: Load Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start app stack
        run: docker compose up -d && sleep 60

      - name: Run migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/westbridge_test

      - name: Seed test data
        run: npx tsx scripts/seed-staging.ts
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/westbridge_test

      - name: Run smoke test
        uses: grafana/k6-action@v0.3.0
        with:
          filename: load-tests/smoke.js

      - name: Run load test
        uses: grafana/k6-action@v0.3.0
        with:
          filename: load-tests/load.js
          flags: --out json=results.json

      - name: Check thresholds
        run: node scripts/check-load-test-results.js results.json

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-results-${{ github.run_id }}
          path: results.json
          retention-days: 30

      - name: Comment results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('results.json')) return;
            const lines = fs.readFileSync('results.json', 'utf8').trim().split('\n');
            const summary = lines
              .map(l => { try { return JSON.parse(l); } catch { return null; } })
              .filter(Boolean)
              .filter(e => e.type === 'Point' && e.metric === 'http_req_duration');
            if (summary.length === 0) return;
            const values = summary.map(e => e.data.value).sort((a, b) => a - b);
            const p95 = values[Math.floor(values.length * 0.95)];
            const p99 = values[Math.floor(values.length * 0.99)];
            const avg = values.reduce((a, b) => a + b, 0) / values.length;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Load Test Results\n\n| Metric | Value |\n|--------|-------|\n| p95 | ${p95?.toFixed(0) ?? '—'}ms |\n| p99 | ${p99?.toFixed(0) ?? '—'}ms |\n| avg | ${avg?.toFixed(0) ?? '—'}ms |\n| requests | ${values.length} |`
            });
